<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Registration Form</h2>

<form>

<label>Full Name:</label><br>
<input type="text" placeholder="Enter your full name" required><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter your email" required><br><br>

<label>Password:</label><br>
<input type="password" placeholder="Enter your password" required><br><br>
<div class="gender">
<label>Gender:</label><br>

<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
</div>
<br><br>

<label>Course / Interest:</label><br>

<select required>
    <option>Select Course</option>
    <option>Web Development</option>
    <option>Java</option>
    <option>Python</option>
    <option>UI/UX</option>
</select>

<br><br>

<input type="submit" value="Register Now">

</form>

</body>
</html>
